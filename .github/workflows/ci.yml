name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install dependencies
        run: npm ci

      - name: Install consumer-test dependencies
        run: cd consumer-test && npm install

      - name: Run all tests (unit + parity + onchain with Anvil)
        run: npm run test:all

      - name: Run consumer packaging validation
        run: npm run consumer:test
